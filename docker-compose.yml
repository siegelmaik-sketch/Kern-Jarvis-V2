services:
  kern-jarvis-v2:
    build: .
    container_name: domenico-jarvis
    stdin_open: true
    tty: true
    restart: unless-stopped
    volumes:
      - ./data:/app/data        # SQLite DB + State
      - ./tools:/app/tools      # Self-built tools persist
      - ~/.claude:/root/.claude:ro  # Claude Code OAuth credentials
    environment:
      - PYTHONUNBUFFERED=1
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
    networks:
      - default
      - jarvis-shared

networks:
  jarvis-shared:
    external: true
